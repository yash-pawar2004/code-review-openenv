spec_version: 1
name: code_review_env
type: space
tags:
  - openenv
runtime: fastapi
version: "1.0.0"
description: >
  A reinforcement learning environment that simulates code review tasks.
  The agent receives a code snippet with an issue and must identify the problem.
app: server.app:app
port: 7860
entrypoint: server.app:app
health_check: /health

interface:
  reset:
    method: POST
    path: /reset
    returns: CodeObservation

  step:
    method: POST
    path: /step
    body:
      review: string
    returns: StepResult

  state:
    method: GET
    path: /state
    returns: CodeState

observation_space:
  type: object
  fields:
    code:
      type: string
      description: Code snippet under review
    task:
      type: string
      description: Review category (style, bug, security)
    description:
      type: string
      description: Instructions for the agent
    difficulty:
      type: string
      description: Difficulty label for the current review task
    step:
      type: integer
      description: Current phase of the 3-step review episode
    history:
      type: array
      items:
        type: string
      description: Previous review comments from earlier steps in the same episode
    lines_of_code:
      type: integer
      description: Number of code lines in the current snippet
    issue_type:
      type: string
      description: Canonical issue family for the current task (bug/style/security)
    hint_level:
      type: integer
      description: Hint intensity for the task (0 hard, 1 medium, 2 easy)

action_space:
  type: object
  fields:
    review:
      type: string
      description: Agent review comment describing the issue

reward:
  min: 0.0
  max: 1.0
  type: float
  description: >
    Reward is deterministic and step-weighted:
    Step 1 (identify issue) -> 0.3
    Step 2 (explain issue) -> 0.3
    Step 3 (suggest fix) -> 0.4
    Some tasks include verifier-based checks for controlled bug detection.

tasks:
  - id: code_review_style
    name: code_review_style
    description: Easy code review task focused on spotting Python style issues.
    difficulty: easy
    enabled: true
    grader: grade_task_code_review_style

  - id: code_review_logic
    name: code_review_logic
    description: Medium code review task focused on logic and control-flow bugs.
    difficulty: medium
    enabled: true
    grader: grade_task_code_review_logic

  - id: code_review_security
    name: code_review_security
    description: Hard code review task focused on security vulnerabilities.
    difficulty: hard
    enabled: true
    grader: grade_task_code_review_security

  - id: division_by_zero
    name: division_by_zero
    description: Easy bug-finding task for division-by-zero review comments.
    difficulty: easy
    enabled: true
    grader: grade_task_division_by_zero

  - id: mutable_default_argument
    name: mutable_default_argument
    description: Medium bug-finding task for shared mutable default arguments.
    difficulty: medium
    enabled: true
    grader: grade_task_mutable_default_argument

  - id: sql_injection
    name: sql_injection
    description: Easy security review task for unsafe SQL string concatenation.
    difficulty: easy
    enabled: true
    grader: grade_task_sql_injection

episode:
  max_steps: 3
  done_after_first_step: false

deployment:
  type: docker
  port: 7860
  health_check: /health
