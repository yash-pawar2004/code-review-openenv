spec_version: "1"
name: code_review_env
description: "LLM agent environment for automated code review. The agent identifies bugs, security vulnerabilities, and style issues in Python code across three structured steps."
version: "1.0.0"
type: space
tags:
  - openenv
runtime: fastapi
app: app:app
port: 7860
entrypoint: app:app
health_check: /health

observation_space:
  type: object
  fields:
    code:
      type: string
      description: Python code snippet to review
    task_type:
      type: string
      description: Category of issue (bug, security, style)
    difficulty:
      type: string
      description: easy, medium, or hard
    step:
      type: integer
      description: Current step (1=identify, 2=explain, 3=fix)
    description:
      type: string
      description: Task instructions for current step
    history:
      type: array
      description: Previous agent responses in this episode

action_space:
  type: object
  fields:
    review:
      type: string
      description: Agent review comment

reward:
  type: float
  min: 0.0
  max: 1.0
  description: "Step-weighted reward. Step 1=0.3, Step 2=0.3, Step 3=0.4. Partial credit for near-correct responses."

tasks:
  - id: style_review
    name: "Style Review"
    description: "Identify Python style and readability issues (easy). Agent must spot anti-patterns like range(len()), unused variables, boolean comparisons."
    difficulty: easy
    enabled: true
    grader: "graders:grade_style"

  - id: bug_review
    name: "Bug Review"
    description: "Identify logical bugs in Python code (medium). Agent must find issues like division by zero, mutable defaults, infinite loops."
    difficulty: medium
    enabled: true
    grader: "graders:grade_bug"

  - id: security_review
    name: "Security Review"
    description: "Identify security vulnerabilities in Python code (hard). Agent must find SQL injection, command injection, hardcoded secrets."
    difficulty: hard
    enabled: true
    grader: "graders:grade_security"

interface:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  grade:
    method: POST
    path: /grade

episode:
  max_steps: 3

deployment:
  type: docker
  port: 7860
